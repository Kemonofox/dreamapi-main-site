<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docs — DreamAPI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@0,400;0,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0c0b09; --ink-3: #6b6860;
  --paper: #faf8f4; --paper-2: #f2efe9; --paper-3: #edeae3;
  --rule: #d8d4cc; --hot: #ff2d20; --hot-dim: rgba(255,45,32,.07);
}
html { scroll-behavior: smooth; }
body {
  background: var(--paper); color: var(--ink);
  font-family: 'Instrument Sans', sans-serif;
  min-height: 100vh; cursor: none; overflow-x: hidden;
}
#cursor {
  position: fixed; width: 8px; height: 8px; background: var(--hot);
  border-radius: 50%; pointer-events: none; z-index: 99999;
  transform: translate(-50%,-50%); transition: width .3s, height .3s;
  mix-blend-mode: multiply;
}
#cursor-ring {
  position: fixed; width: 36px; height: 36px; border: 1px solid var(--ink);
  border-radius: 50%; pointer-events: none; z-index: 99998;
  transform: translate(-50%,-50%); opacity: .3;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 56px; display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 0 40px;
  border-bottom: 1px solid var(--rule);
  background: rgba(250,248,244,.92); backdrop-filter: blur(12px);
}
.nav-logo {
  font-family: 'Space Mono', monospace; font-size: .8rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--ink);
  text-decoration: none; display: flex; align-items: center; gap: 10px;
}
.logo-mark {
  width: 20px; height: 20px; border: 1.5px solid var(--ink);
  border-radius: 50%; position: relative; flex-shrink: 0;
}
.logo-mark::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); width: 6px; height: 6px;
  background: var(--hot); border-radius: 50%;
  animation: breathe 2.4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.6);opacity:.5}
}
.nav-center {
  font-family: 'Space Mono', monospace; font-size: .65rem;
  color: var(--ink-3); letter-spacing: .08em; text-align: center;
}
.nav-right { display: flex; justify-content: flex-end; }
.nav-back {
  font-family: 'Space Mono', monospace; font-size: .7rem;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--ink-3); text-decoration: none; transition: color .2s;
}
.nav-back:hover { color: var(--ink); }

.hamburger {
  display: none; flex-direction: column; gap: 5px;
  cursor: none; background: none; border: none; padding: 4px;
}
.hamburger span { display: block; width: 22px; height: 1.5px; background: var(--ink); transition: all .35s cubic-bezier(.16,1,.3,1); }
.hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.mob-nav {
  position: fixed; top: 56px; left: 0; right: 0;
  background: var(--paper); border-bottom: 1px solid var(--rule);
  padding: 0 40px; z-index: 999; flex-direction: column; gap: 0;
  max-height: 0; overflow: hidden; display: flex;
  transition: max-height .45s cubic-bezier(.16,1,.3,1), padding .45s cubic-bezier(.16,1,.3,1);
}
.mob-nav.open { max-height: 300px; padding: 1.5rem 40px 2rem; }
.mob-nav a {
  font-family: 'Space Mono', monospace; font-size: .82rem;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--ink-3); text-decoration: none;
  padding-bottom: 1.25rem; border-bottom: 1px solid var(--rule);
  opacity: 0; transform: translateY(10px);
  transition: opacity .3s ease, transform .3s ease, color .2s;
}
.mob-nav a:hover { color: var(--ink); }
.mob-nav.open a:nth-child(1){opacity:1;transform:none;transition-delay:.08s}
.mob-nav.open a:nth-child(2){opacity:1;transform:none;transition-delay:.14s}
.mob-nav.open a:nth-child(3){opacity:1;transform:none;transition-delay:.20s}

/* ── HERO ── */
.docs-hero {
  padding: 140px 40px 60px; border-bottom: 1px solid var(--rule);
  display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: end;
}
.docs-hero-left {}
.section-num {
  font-family: 'Space Mono', monospace; font-size: .62rem;
  letter-spacing: .15em; color: var(--hot); text-transform: uppercase;
  display: flex; align-items: center; gap: 12px; margin-bottom: 1rem;
}
.section-num::before { content:''; display:block; width:24px; height:1px; background:var(--hot); }
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 6vw, 5.5rem); font-weight: 300;
  line-height: .95; letter-spacing: -.03em; color: var(--ink);
}
h1 em { font-style: italic; color: var(--ink-3); }

.docs-hero-right {
  display: flex; flex-direction: column; gap: 1.5rem; padding-bottom: .25rem;
}
.search-wrap { position: relative; }
.search-input {
  width: 100%; font-family: 'Space Mono', monospace; font-size: .8rem;
  padding: .85rem 1rem .85rem 2.75rem;
  background: var(--paper-2); border: 1px solid var(--rule);
  color: var(--ink); outline: none; transition: border-color .25s; cursor: text;
}
.search-input:focus { border-color: var(--ink); }
.search-input::placeholder { color: var(--rule); }
.search-icon {
  position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
  font-size: .85rem; color: var(--rule); pointer-events: none;
  transition: color .25s;
}
.search-wrap:focus-within .search-icon { color: var(--ink); }

.hero-stats { display: flex; gap: 2.5rem; }
.hs-item { display: flex; flex-direction: column; gap: .3rem; }
.hs-val {
  font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;
  font-weight: 300; color: var(--ink); line-height: 1; letter-spacing: -.03em;
}
.hs-label {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3);
}

/* ── MAIN CONTENT ── */
.docs-body { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 56px); }

/* Filter sidebar */
.docs-sidebar {
  border-right: 1px solid var(--rule); padding: 32px 0; position: sticky;
  top: 56px; height: calc(100vh - 56px); overflow-y: auto;
}
.docs-sidebar::-webkit-scrollbar { width: 3px; }
.docs-sidebar::-webkit-scrollbar-thumb { background: var(--rule); }
.ds-title {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3);
  padding: 0 20px; margin-bottom: 12px;
}
.ds-count {
  font-family: 'Space Mono', monospace; font-size: .62rem;
  letter-spacing: .06em; color: var(--rule); padding: 0 20px; margin-top: 20px;
  line-height: 1.8;
}

/* ── LIST ── */
.docs-list { padding: 0; }

.doc-card {
  padding: 32px 40px; border-bottom: 1px solid var(--rule);
  cursor: pointer; transition: background .2s; position: relative; overflow: hidden;
}
.doc-card:hover { background: var(--hot-dim); }
.doc-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 0; background: var(--hot); transition: width .3s;
}
.doc-card:hover::before { width: 3px; }
.doc-card-row {
  display: flex; align-items: baseline; gap: 1.25rem;
  margin-bottom: .4rem; flex-wrap: wrap;
}
.doc-card-name {
  font-family: 'Cormorant Garamond', serif; font-size: 1.4rem;
  font-weight: 600; color: var(--ink); letter-spacing: -.01em; line-height: 1;
}
.doc-card-ep {
  font-family: 'Space Mono', monospace; font-size: .72rem; color: var(--ink-3);
}
.doc-card-date {
  margin-left: auto; font-family: 'Space Mono', monospace;
  font-size: .6rem; color: var(--rule); white-space: nowrap;
}
.doc-card-preview {
  font-size: .85rem; color: var(--ink-3); line-height: 1.5;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.docs-none {
  padding: 80px 40px; text-align: center;
  font-family: 'Space Mono', monospace; font-size: .72rem;
  color: var(--rule); letter-spacing: .08em; line-height: 2;
}

/* Pagination */
.docs-pagination {
  padding: 32px 40px; border-top: 1px solid var(--rule);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.pg-btn {
  font-family: 'Space Mono', monospace; font-size: .68rem;
  letter-spacing: .08em; text-transform: uppercase; padding: .6rem 1.2rem;
  border: 1px solid var(--rule); background: transparent;
  color: var(--ink-3); cursor: pointer; transition: all .2s;
}
.pg-btn:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }
.pg-btn:disabled { opacity: .25; cursor: not-allowed; }
.pg-info {
  font-family: 'Space Mono', monospace; font-size: .65rem;
  color: var(--ink-3); letter-spacing: .06em;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(12,11,9,.72);
  backdrop-filter: blur(6px); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--paper); border: 1px solid var(--rule);
  width: 92%; max-width: 760px; max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(20px); transition: transform .28s cubic-bezier(.16,1,.3,1);
}
.modal-overlay.open .modal { transform: none; }

.modal-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 24px 32px; border-bottom: 1px solid var(--rule); flex-shrink: 0;
}
.modal-info {}
.modal-title {
  font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;
  font-weight: 600; letter-spacing: -.02em; color: var(--ink); line-height: 1.1;
}
.modal-ep {
  font-family: 'Space Mono', monospace; font-size: .72rem;
  color: var(--ink-3); margin-top: .4rem;
}
.modal-meta {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  color: var(--rule); margin-top: .25rem;
}
.modal-close {
  font-family: 'Space Mono', monospace; font-size: .68rem;
  letter-spacing: .06em; text-transform: uppercase;
  background: none; border: 1px solid var(--rule); color: var(--ink-3);
  cursor: pointer; padding: .4rem .85rem; transition: all .2s; flex-shrink: 0;
  margin-left: 1rem;
}
.modal-close:hover { border-color: var(--hot); color: var(--hot); }

.modal-body { flex: 1; overflow-y: auto; padding: 32px; }
.modal-body::-webkit-scrollbar { width: 3px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--rule); }
.modal-body .no-docs {
  font-family: 'Space Mono', monospace; font-size: .72rem;
  color: var(--rule); letter-spacing: .06em; line-height: 2;
}
/* md */
.modal-body h1,.modal-body h2,.modal-body h3 {
  font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--ink);
  letter-spacing:-.02em;margin:1.5rem 0 .7rem;
}
.modal-body h1{font-size:1.6rem}.modal-body h2{font-size:1.3rem}.modal-body h3{font-size:1.1rem}
.modal-body p{font-size:.88rem;color:var(--ink-3);line-height:1.7;margin-bottom:.85rem}
.modal-body code{font-family:'Space Mono',monospace;font-size:.74rem;background:var(--paper-2);padding:.15rem .4rem;color:var(--ink)}
.modal-body pre{background:var(--ink);padding:1.25rem;margin:1rem 0;overflow-x:auto}
.modal-body pre code{background:none;color:#86efac;padding:0;font-size:.74rem;line-height:1.7}
.modal-body ul,.modal-body ol{padding-left:1.4rem;margin-bottom:.85rem}
.modal-body li{font-size:.88rem;color:var(--ink-3);line-height:1.65}
.modal-body blockquote{border-left:2px solid var(--hot);padding-left:1rem;margin:1rem 0;font-style:italic;color:var(--ink-3)}
.modal-body hr{border:none;border-top:1px solid var(--rule);margin:1.5rem 0}
.modal-body a{color:var(--hot);text-decoration:none}
.modal-body table{width:100%;border-collapse:collapse;font-size:.84rem;margin-bottom:1rem}
.modal-body th{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.5rem .75rem;border-bottom:1px solid var(--rule);text-align:left}
.modal-body td{padding:.5rem .75rem;border-bottom:1px solid var(--paper-3);color:var(--ink-3)}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--rule); padding: 2rem 40px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 1rem; background: var(--paper-2);
}
.footer-copy {
  font-family: 'Space Mono', monospace; font-size: .62rem;
  color: var(--rule); letter-spacing: .06em;
}
.footer-link {
  font-family: 'Space Mono', monospace; font-size: .62rem;
  color: var(--ink-3); text-decoration: none; letter-spacing: .06em;
  text-transform: uppercase; transition: color .2s;
}
.footer-link:hover { color: var(--hot); }

/* Animations */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity .6s ease, transform .6s ease; }
.reveal.on { opacity: 1; transform: none; }
.reveal.d1 { transition-delay: .1s; }
.reveal.d2 { transition-delay: .2s; }

@media(max-width:900px){
  .docs-hero { grid-template-columns: 1fr; gap: 2.5rem; padding: 120px 24px 48px; }
  .docs-body { grid-template-columns: 1fr; }
  .docs-sidebar { display: none; }
  .doc-card { padding: 24px; }
  nav { padding: 0 24px; grid-template-columns: 1fr auto; }
  .nav-center { display: none; }
  .nav-right { display: none; }
  .hamburger { display: flex; }
  .mob-nav { padding: 0 24px; }
  .mob-nav.open { padding: 1.5rem 24px 2rem; }
}
@media(max-width:480px){
  .docs-hero { padding: 110px 20px 40px; }
  .doc-card { padding: 20px; }
  .docs-pagination { padding: 24px 20px; }
  footer { padding: 1.5rem 20px; }
  .modal-header { padding: 20px; }
  .modal-body { padding: 20px; }
}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo"><span class="logo-mark"></span>DreamAPI</a>
  <div class="nav-center">Documentation</div>
  <div class="nav-right">
    <a href="/" class="nav-back">← 홈으로</a>
  </div>
  <button class="hamburger" id="hbg" onclick="toggleMob()"><span></span><span></span><span></span></button>
</nav>

<div class="mob-nav" id="mobNav">
  <a href="/" onclick="toggleMob()">← 홈으로</a>
  <a href="/dashboard" onclick="toggleMob()">대시보드</a>
</div>

<!-- HERO -->
<div class="docs-hero">
  <div class="docs-hero-left">
    <div class="section-num">Documentation</div>
    <h1>API<br><em>레퍼런스</em></h1>
  </div>
  <div class="docs-hero-right">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput"
        placeholder="API 이름 또는 엔드포인트 검색..."
        oninput="handleSearch()" autocomplete="off">
    </div>
    <div class="hero-stats">
      <div class="hs-item">
        <div class="hs-val" id="statTotal">—</div>
        <div class="hs-label">전체 API</div>
      </div>
      <div class="hs-item">
        <div class="hs-val" id="statPage">—</div>
        <div class="hs-label">현재 페이지</div>
      </div>
    </div>
  </div>
</div>

<!-- BODY -->
<div class="docs-body">
  <!-- Sidebar -->
  <aside class="docs-sidebar">
    <div class="ds-title">필터</div>
    <div class="ds-count" id="sidebarInfo">불러오는 중...</div>
  </aside>

  <!-- List + Pagination -->
  <div>
    <div id="docsList">
      <div class="docs-none">불러오는 중...</div>
    </div>
    <div class="docs-pagination" id="docsPagination" style="display:none">
      <button class="pg-btn" id="pgPrev" onclick="changePage(-1)">← 이전</button>
      <span class="pg-info" id="pgInfo"></span>
      <button class="pg-btn" id="pgNext" onclick="changePage(1)">다음 →</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="docModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-info">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-ep" id="modalEp"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">닫기 ×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <span class="footer-copy">© 2025 DreamAPI Inc.</span>
  <a href="/" class="footer-link">← 홈으로</a>
</footer>

<script>
// ── Cursor ───────────────────────────────────────────────────────────────────
const cur = document.getElementById('cursor')
const ring = document.getElementById('cursor-ring')
let mx=0,my=0,rx=0,ry=0
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; })
;(function animRing(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing) })()
document.addEventListener('mouseover', e => {
  const t = e.target
  if (t.matches('a,button,input')) { cur.style.width='16px'; cur.style.height='16px'; }
  else { cur.style.width='8px'; cur.style.height='8px'; }
})

// ── Mobile nav ───────────────────────────────────────────────────────────────
function toggleMob() {
  document.getElementById('mobNav').classList.toggle('open')
  document.getElementById('hbg').classList.toggle('open')
}

// ── State ────────────────────────────────────────────────────────────────────
const LIMIT = 10
let currentPage = 1
let total = 0
let searchTerm = ''
let searchTimer

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadDocs() {
  const offset = (currentPage - 1) * LIMIT
  const params = new URLSearchParams({ limit: LIMIT, offset })
  if (searchTerm) params.set('search', searchTerm)

  document.getElementById('docsList').innerHTML = '<div class="docs-none">불러오는 중...</div>'
  document.getElementById('docsPagination').style.display = 'none'

  try {
    const res = await fetch('/api/apis?' + params)
    const data = await res.json()
    total = data.total
    renderList(data.items || [])
    renderPagination()
    updateStats(data.items || [])
  } catch {
    document.getElementById('docsList').innerHTML = '<div class="docs-none">불러오기에 실패하였습니다.<br>잠시 후 다시 시도하십시오.</div>'
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderList(items) {
  const list = document.getElementById('docsList')
  if (!items.length) {
    list.innerHTML = searchTerm
      ? `<div class="docs-none">"${esc(searchTerm)}"에 대한<br>검색 결과가 없습니다.</div>`
      : '<div class="docs-none">등록된 API 문서가 없습니다.</div>'
    return
  }
  list.innerHTML = items.map(api => {
    const preview = (api.docs || '')
      .replace(/```[\s\S]*?```/g, '')
      .replace(/[#*`_>|]/g, '')
      .replace(/\s+/g, ' ').trim().slice(0, 120)
    return `
      <div class="doc-card" onclick="openModal(${JSON.stringify(api).replace(/"/g,'&quot;')})">
        <div class="doc-card-row">
          <span class="doc-card-name">${esc(api.name)}</span>
          <span class="doc-card-ep">${esc(api.endpoint)}</span>
          <span class="doc-card-date">${fmtDate(api.updatedAt)}</span>
        </div>
        ${preview ? `<div class="doc-card-preview">${esc(preview)}</div>` : ''}
      </div>
    `
  }).join('')
}

function renderPagination() {
  const totalPages = Math.ceil(total / LIMIT)
  const pg = document.getElementById('docsPagination')
  if (totalPages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex'
  document.getElementById('pgInfo').textContent = `${currentPage} / ${totalPages} 페이지`
  document.getElementById('pgPrev').disabled = currentPage <= 1
  document.getElementById('pgNext').disabled = currentPage >= totalPages
}

function updateStats(items) {
  document.getElementById('statTotal').textContent = total
  document.getElementById('statPage').textContent = items.length
  document.getElementById('sidebarInfo').innerHTML =
    `전체 <strong>${total}</strong>개<br>` +
    (searchTerm ? `"${esc(searchTerm)}" 검색 결과` : `페이지 ${currentPage}`) +
    `<br><br>10개씩 표시`
}

// ── Pagination ───────────────────────────────────────────────────────────────
function changePage(dir) {
  const totalPages = Math.ceil(total / LIMIT)
  const next = currentPage + dir
  if (next < 1 || next > totalPages) return
  currentPage = next
  window.scrollTo({ top: 0, behavior: 'smooth' })
  loadDocs()
}

// ── Search ───────────────────────────────────────────────────────────────────
function handleSearch() {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(() => {
    searchTerm = document.getElementById('searchInput').value.trim()
    currentPage = 1
    loadDocs()
  }, 300)
}

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal(api) {
  document.getElementById('modalTitle').textContent = api.name
  document.getElementById('modalEp').textContent = api.endpoint
  document.getElementById('modalMeta').textContent = `최종 수정: ${fmtDate(api.updatedAt)}`
  document.getElementById('modalBody').innerHTML = api.docs
    ? marked.parse(api.docs)
    : '<p class="no-docs">작성된 문서가 없습니다.</p>'
  document.getElementById('docModal').classList.add('open')
  document.body.style.overflow = 'hidden'
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('docModal')) closeModal()
}

function closeModal() {
  document.getElementById('docModal').classList.remove('open')
  document.body.style.overflow = ''
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function fmtDate(iso) {
  const d = new Date(iso)
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`
}

// ── Scroll reveal ────────────────────────────────────────────────────────────
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('on') })
}, { threshold: .1 })
document.querySelectorAll('.reveal').forEach(el => io.observe(el))

// ── Init ─────────────────────────────────────────────────────────────────────
loadDocs()
</script>
</body>
</html>
